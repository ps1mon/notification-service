services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: notif_app
        volumes:
            - ./:/var/www
        depends_on:
            - db
            - redis
        networks:
            - notif

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: notif_queue
        command: php artisan queue:work --sleep=3 --tries=3 --backoff=5
        volumes:
            - ./:/var/www
        depends_on:
            - app
            - db
            - redis
        networks:
            - notif

    nginx:
        image: nginx:1.27-alpine
        container_name: notif_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - notif

    db:
        image: postgres:16-alpine
        container_name: notif_db
        environment:
            POSTGRES_DB: notifications
            POSTGRES_USER: notif
            POSTGRES_PASSWORD: notif
        ports:
            - "5433:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        networks:
            - notif

    redis:
        image: redis:7-alpine
        container_name: notif_redis
        networks:
            - notif

networks:
    notif:
        driver: bridge

volumes:
    db_data:
