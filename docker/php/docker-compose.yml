version: "3.8"

services:
    app:
        build:
            context: ../..
            dockerfile: docker/php/Dockerfile
        container_name: notif_app
        volumes:
            - ./:/var/www
        environment:
            - PHP_IDE_CONFIG=serverName=notification-service
        depends_on:
            - db
            - redis
        networks:
            - notif

    queue:
        build:
            context: ../..
            dockerfile: docker/php/Dockerfile
        container_name: notif_queue
        command: php artisan queue:work --sleep=3 --tries=3 --backoff=5
        volumes:
            - ./:/var/www
        depends_on:
            - app
            - db
            - redis
        networks:
            - notif

    nginx:
        image: nginx:1.27-alpine
        container_name: notif_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - notif

    db:
        image: mysql:8.0
        container_name: notif_db
        environment:
            MYSQL_DATABASE: notifications
            MYSQL_USER: notif
            MYSQL_PASSWORD: notif
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3307:3306"
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - notif

    redis:
        image: redis:7-alpine
        container_name: notif_redis
        networks:
            - notif

networks:
    notif:
        driver: bridge

volumes:
    db_data:
